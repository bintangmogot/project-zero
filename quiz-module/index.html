<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="files/Konohagakure.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Noto+Serif+JP:wght@200..900&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="files/ninja-naruto/njnaruto.ttf" rel="stylesheet">
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container" class="container">
        <div id="start-screen" class="screen active">
            <h1 id="title-quiz">Quiz Time!</h1>
            <p id="description-quiz">Test your knowledge with these fun questions</p>
            <button id="start-btn">Start Quiz</button>
        </div>
        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <h2 id="question-text">Questions here</h2>
                <div class="quiz-info">
                    <p>Question <span id="current-question">[num]</span> of <span id="total-questions">[num]</span></p>
                    <p>Score: <span id="score"></span></p>
                </div>
            </div>

            <div id="answers-container" class="answers-container">
                <!-- answers will fill up here by js -->
            </div>
            <div class="navigation">
                <button id="prev" class="prev-btn">Previous</button>
                <button id="skip" class="skip-btn">Skip</button>
            </div>
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <h1>Quiz Result</h1>
            <div id="result-info" class="result-info">
                    <p>You scored <span id="final-score">[num]</span> out of <span id="max-score">[num]</span></p>
                    <h2 id="result-message"></h2>
            </div>
            <div class="result-navigation">
                <button id="restart-btn" class="restart-btn">Restart Quiz</button>
                <button id="home-btn" class="home-btn">Home</button>
                <button id="next-quiz-btn" class="next-btn">Next Quiz</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
