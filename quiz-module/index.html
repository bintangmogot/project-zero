<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="start-screen" class="screen active">
            <h1>Quiz Time!</h1>
            <p>Test your knowledge with these fun questions</p>
            <button id="start-btn">Start Quiz</button>
        </div>
        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <h2 id="question-text">Questions here</h2>
                <div class="quiz-info">
                    <p>Question <span id="current-question">[num]</span> of <span id="total-questions">[num]</span></p>
                    <p>Score: <span id="score"></span></p>
                </div>
            </div>

            <div id="answers-container" class="answers-container">
                <!-- answers will fill up here by js -->
            </div>

            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <h1>Quiz Result</h1>
            <div class="result-info">
                    <p>You scored <span id="final-score">[num]</span> out of <span id="max-score">[num]</span></p>
                    <h2 id="result-message"></h2>
                </div>
            <button id="restart-btn" class="restart-btn">Restart Quiz</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
